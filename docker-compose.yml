services:
  api:
    build:
      context: .
      dockerfile: DockerFile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Host=host.docker.internal;Port=5432;Database=matos;Username=webdev;Password=password
    ports:
      - "8082:8080"
    volumes:
      - ./uploads_data:/app/wwwroot/uploads
      - ./logs_data:/app/logs
    networks:
      - web
      - sail
    labels:
      - traefik.enable=true
      - traefik.docker.network=web

      - traefik.http.routers.back-matos.rule=Host(`matos.pierreleroyer.fr`)
      - traefik.http.routers.back-matos.entrypoints=websecure
      - traefik.http.routers.back-matos.tls=true
      - traefik.http.routers.back-matos.tls.certresolver=tlsresolver
      - traefik.http.routers.back-matos.priority=1

      - traefik.http.services.back-matos.loadbalancer.server.port=8082
  pgsql:
    image: postgres:18-alpine
    ports:
      - ${FORWARD_DB_PORT:-5432}:5432
    environment:
      PGPASSWORD: ${DB_PASSWORD:-secret}
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - sail-pgsql:/var/lib/postgresql/data
    networks:
      - sail
    healthcheck:
      test:
        - CMD
        - pg_isready
        - -q
        - -d
        - ${DB_DATABASE}
        - -U
        - ${DB_USERNAME}
      retries: 3
      timeout: 5s

volumes:
  sail-pgsql:
    driver: local
networks:
  web:
    external: true
  sail:
    driver: bridge
