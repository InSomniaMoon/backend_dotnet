name: deploy Dotnet app

on:
  push:
    branches: ["main"]

jobs:
  deploy-app:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh/
          echo "${{ secrets.SSH_PRIV_KEY }}" > ~/.ssh/id_rsa
          echo "${{ secrets.SSH_PUB_KEY }}" > ~/.ssh/id_rsa.pub
          chmod 600 ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa.pub
          ssh-keyscan -p 2222 -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts
      - name: sync code to server
        run:
          ssh -o StrictHostKeyChecking=no -p 2222 ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "cd /mnt/HDD_Pedro/docker_folders/backend_dotnet
          && git pull && docker-compose up -d --build --remove-orphans
          && docker-compose exec -T api dotnet ef database update
          "
